name: 🔍 Auto-Index to Google

on:
  # Submitter URLs après chaque push sur main
  push:
    branches: [main]
    paths:
      - "src/**"
      - "URLS_TO_INDEX.txt"
      - ".github/workflows/index.yml"

  # Exécuter chaque dimanche à 0h UTC
  schedule:
    - cron: "0 0 * * 0"

  # Permettre d'exécuter manuellement
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: 📚 Install dependencies
        run: npm install google-auth-library

      - name: 🚀 Notify Google Indexing API
        run: node scripts/notify-google.js
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: 📊 Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: indexing-logs
          path: indexing-*.log
          retention-days: 30

      - name: 💬 Post Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🔍 Google Indexing Status: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "📍 *Google Indexing Notification*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nRepo: ${{ github.repository }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
